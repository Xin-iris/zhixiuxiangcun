<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 900" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">阿热灵绣金色品牌标识</title>
  <desc id="logoDesc">以金属金色呈现的阿热灵绣品牌标识，包含绿色、红色和蓝色三枚色柱。</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d4816"/>
      <stop offset="0.18" stop-color="#f8dc83"/>
      <stop offset="0.38" stop-color="#9b6a24"/>
      <stop offset="0.58" stop-color="#ffe79a"/>
      <stop offset="0.8" stop-color="#8b5b1d"/>
      <stop offset="1" stop-color="#e0ae4f"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#fff0af"/>
      <stop offset="0.45" stop-color="#d8a644"/>
      <stop offset="1" stop-color="#4b2d0a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1"><stop stop-color="#123f32"/><stop offset=".55" stop-color="#28654d"/><stop offset="1" stop-color="#0c2f28"/></linearGradient>
    <linearGradient id="red" x1="0" x2="1"><stop stop-color="#74210f"/><stop offset=".55" stop-color="#c44824"/><stop offset="1" stop-color="#5b170c"/></linearGradient>
    <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#172a50"/><stop offset=".55" stop-color="#315287"/><stop offset="1" stop-color="#101f3d"/></linearGradient>
    <filter id="metal" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".018 .16" numOctaves="3" seed="21" result="grain"/>
      <feDisplacementMap in="SourceGraphic" in2="grain" scale="1.3" result="rough"/>
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000" flood-opacity=".72"/>
      <feSpecularLighting in="grain" surfaceScale="2" specularConstant=".38" specularExponent="16" lighting-color="#fff4c6" result="shine">
        <feDistantLight azimuth="225" elevation="48"/>
      </feSpecularLighting>
      <feComposite in="shine" in2="rough" operator="in" result="lit"/>
      <feBlend in="rough" in2="lit" mode="screen"/>
    </filter>
    <filter id="barTexture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".035" numOctaves="3" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1"/>
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000" flood-opacity=".6"/>
    </filter>
  </defs>

  <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round" filter="url(#metal)">
    <!-- 左侧飞线与云气 -->
    <path d="M142 136c78-43 160-24 151 28-7 40-58 64-92 92-44 36-47 73 6 92 37 13 75 7 88 33 16 34-28 66-81 94-48 25-82 62-88 106" stroke-width="30"/>
    <path d="M212 254c-51 36-46 76 17 94" stroke-width="16"/>
    <path d="M128 532c73-25 142-18 205 20" stroke-width="17"/>

    <!-- 中心主字与针形中轴 -->
    <path d="M488 82l16 694" stroke-width="39"/>
    <path d="M345 178h258" stroke-width="34"/>
    <path d="M328 292h425" stroke-width="34"/>
    <path d="M348 405h254" stroke-width="34"/>
    <path d="M650 178h138q35 0 35 35v30" stroke-width="34"/>
    <path d="M650 405h145q48 0 48-48v-65" stroke-width="34"/>

    <!-- 下方四支刺绣枝形 -->
    <path d="M393 496c-51 44-51 102-4 145 35 32 38 86 20 151" stroke-width="32"/>
    <path d="M478 496c-42 43-45 91-8 126 38 36 42 95 27 170" stroke-width="32"/>
    <path d="M560 496c48 43 48 94 8 129-39 35-42 94-25 167" stroke-width="32"/>
    <path d="M677 496c-50 46-50 103-3 145 36 33 39 87 22 151" stroke-width="32"/>
    <path d="M791 496c48 43 49 96 9 132-39 35-42 93-25 164" stroke-width="32"/>
    <circle cx="504" cy="790" r="18" stroke="url(#goldEdge)" stroke-width="10"/>
  </g>

  <!-- 金属边缘高光，强化新 logo 的立体质感 -->
  <g fill="none" stroke="#fff0ad" stroke-linecap="round" opacity=".38">
    <path d="M488 94l13 672M350 172h244M337 286h406M356 399h238" stroke-width="4"/>
    <path d="M146 128c75-37 143-16 139 27-4 34-53 57-88 87" stroke-width="4"/>
  </g>

  <!-- 三色绣线色柱 -->
  <g filter="url(#barTexture)">
    <rect x="122" y="685" width="70" height="154" rx="29" fill="url(#green)" stroke="#315f4c" stroke-width="3"/>
    <rect x="214" y="685" width="70" height="154" rx="29" fill="url(#red)" stroke="#b44728" stroke-width="3"/>
    <rect x="306" y="685" width="70" height="154" rx="29" fill="url(#blue)" stroke="#49638f" stroke-width="3"/>
  </g>
</svg>
